# Render Blueprint for Silver Skills AI.
# Deploy: on render.com, "New +" -> "Blueprint" -> select this repo -> Render reads this file.
#
# Service names below (silver-skills-backend / silver-skills-frontend) become part of the default
# *.onrender.com URLs. If either name is already taken, Render will suffix it (e.g. -a1b2) and you
# MUST update the two places that hardcode the other service's URL: this file's `routes` rewrite
# destination, and the backend's CLIENT_ORIGIN env var in the Render dashboard.

databases:
  - name: silver-skills-db
    plan: free

services:
  - name: silver-skills-backend
    type: web
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build:prod
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: silver-skills-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://silver-skills-frontend.onrender.com
      - key: PORT
        value: 4000
      # Paste these two in the Render dashboard yourself (never commit real keys to git):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

  - name: silver-skills-frontend
    type: web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://silver-skills-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
