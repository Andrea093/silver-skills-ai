# Render Blueprint for Silver Skills AI.
# Deploy: on render.com, "New +" -> "Blueprint" -> select this repo -> Render reads this file.
#
# Service names below (silver-skills-backend / silver-skills-frontend) become part of the default
# *.onrender.com URLs. If either name is already taken, Render will suffix it (e.g. -a1b2) and you
# MUST update the two places that hardcode the other service's URL: the frontend's
# VITE_API_BASE_URL build env var below, and the backend's CLIENT_ORIGIN env var.
#
# Frontend and backend are on different onrender.com subdomains, so the frontend calls the
# backend directly (cross-origin, with credentials) instead of relying on a same-origin proxy —
# Render's static-site path rewrite to another Render service proved unreliable in testing.

databases:
  - name: silver-skills-db
    plan: free

services:
  - name: silver-skills-backend
    type: web
    runtime: node
    rootDir: backend
    plan: free
    # --include=dev is required here: NODE_ENV=production (below) makes plain `npm install` skip
    # devDependencies, but prisma/tsx/typescript (needed to build) are devDependencies. Without
    # this flag the build fails with "exit 127: command not found" on the first prisma/tsx call.
    buildCommand: npm install --include=dev && npm run build:prod
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: silver-skills-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://silver-skills-frontend.onrender.com
      - key: PORT
        value: 4000
      # Paste these two in the Render dashboard yourself (never commit real keys to git):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

  - name: silver-skills-frontend
    type: web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://silver-skills-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
